{% extends "base.html" %}

{% block title %}
{{ page.title }}
{% endblock %}

{% block content %}
<article class="page-shell">
  <header class="page-head">
    {% if page.date %}
      <time datetime="{{ page.date }}">{{ page.date | date(format="%Y-%m-%d") }}</time>
    {% endif %}
    <h1>{{ page.title }}</h1>
    {% if page.description %}
      <p>{{ page.description }}</p>
    {% endif %}
  </header>

  <div class="content-body">
    {{ page.content | safe }}
  </div>
</article>
{% endblock %}
