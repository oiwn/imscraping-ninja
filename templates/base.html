<!doctype html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Data Engeneer{% endblock %}</title>
  <meta name="google-site-verification" content="KGrdXDKiqqHg93kix1ByT2oXJi-axmuq2MzK1CvqglM" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@2.1.1/css/pico.jade.min.css">
  <link rel="stylesheet" href="{{ get_url(path="main.css") | safe }}">
  <!-- Google tag (gtag.js) -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-HSS9YD7MGL"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());

    gtag('config', 'G-HSS9YD7MGL');
  </script>
</head>

<body class="site-shell">
  <header class="site-header container">
    <nav class="site-nav">
      <ul class="site-brand">
        <li><a href="{{ get_url(path="/") }}" class="brand-mark">Data Engeneer</a></li>
      </ul>
      <ul class="site-links">
        <li><a href="{{ get_url(path="/") }}" class="contrast">Home</a></li>
        <li><a href="{{ get_url(path="/posts") }}">Notes</a></li>
        <li><a href="{{ get_url(path="/crypto") }}">Crypto</a></li>
        <li><a href="{{ get_url(path="/cv") }}" class="nav-cta">CV</a></li>
      </ul>
    </nav>
  </header>

  <main class="site-main container">
    {% block content %}{% endblock %}
  </main>

  <footer class="site-footer container">
    <small>© oiwn, {{ now() | date(format="%Y") }}</small>
  </footer>
</body>
</html>
